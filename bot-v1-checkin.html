<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>배포봇 v1 | 출석 · 위로금</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family:
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        "Apple Color Emoji",
        "Segoe UI Emoji",
        "Noto Color Emoji",
        sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.18), transparent 55%),
        radial-gradient(circle at bottom right, rgba(236,72,153,0.15), transparent 55%),
        #020617;
      color: #e5e7eb;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 16px 80px;
    }
    header {
      margin-bottom: 28px;
      border-bottom: 1px solid rgba(148,163,184,0.3);
      padding-bottom: 18px;
    }
    header .path {
      font-size: 14px;
      color: #9ca3af;
      margin-bottom: 6px;
    }
    header h1 {
      font-size: 30px;
      margin: 0 0 8px;
      text-shadow: 0 0 14px rgba(59,130,246,0.35);
    }
    header .meta {
      font-size: 14px;
      color: #9ca3af;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }
    header code {
      background: #020617;
      border-radius: 4px;
      padding: 2px 6px;
      border: 1px solid rgba(75,85,99,0.8);
      font-size: 12px;
    }
    .tag {
      font-size: 13px;
      display: inline-block;
      padding: 3px 9px;
      border-radius: 999px;
      background: rgba(15,23,42,0.9);
      border: 1px solid rgba(148,163,184,0.6);
      color: #9ca3af;
    }
    h2 {
      font-size: 22px;
      margin-top: 32px;
      border-bottom: 1px solid rgba(55,65,81,0.7);
      padding-bottom: 6px;
    }
    h3 {
      font-size: 18px;
      margin-top: 20px;
    }
    p {
      font-size: 16px;
      line-height: 1.85;
      color: #d1d5db;
    }
    ul {
      font-size: 16px;
      line-height: 1.85;
      color: #d1d5db;
      padding-left: 20px;
    }
    li + li {
      margin-top: 4px;
    }
    code {
      font-family: "JetBrains Mono", "Fira Code", monospace;
      font-size: 13px;
      background: #020617;
      padding: 1px 5px;
      border-radius: 4px;
      border: 1px solid rgba(55,65,81,0.8);
    }
    .note {
      margin: 16px 0;
      padding: 10px 12px;
      border-radius: 6px;
      background: rgba(30,64,175,0.18);
      border-left: 3px solid #60a5fa;
      font-size: 13px;
      color: #bfdbfe;
    }
    a {
      color: #60a5fa;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="path">배포봇 v1 &gt; RLNL 게임 &gt; 출석 · 위로금</div>
      <h1>출석 · 일일 위로금 · 30분 리필</h1>
      <div class="meta">
        <span class="tag">유저 포인트 보상</span>
        <span class="tag">출석 · 위로금 · 리필 쿨타임</span>
        <span class="tag">레벨 · 경험치 시스템</span>
      </div>
    </header>

    <!-- 이하 내용 그대로 붙여서 쓰면 됨 -->
  </div>
</body>
</html>
