<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>라니MALL 로그인</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
body {
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#020617;
  color:#e5e7eb;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
.auth-card {
  width:100%;
  max-width:360px;
  padding:20px 18px;
  border-radius:16px;
  background:rgba(15,23,42,0.96);
  border:1px solid rgba(55,65,81,0.9);
  box-shadow:0 20px 40px rgba(15,23,42,0.9);
}
.auth-card h1 {
  font-size:18px;
  margin-bottom:10px;
}
.auth-card p {
  font-size:12px;
  color:#9ca3af;
  margin-bottom:14px;
}
.auth-card label {
  display:block;
  font-size:12px;
  margin:6px 0 2px;
}
.auth-card input {
  width:100%;
  padding:7px 9px;
  border-radius:8px;
  border:1px solid rgba(55,65,81,0.9);
  background:#020617;
  color:#e5e7eb;
  font-size:12px;
}
.auth-card button {
  width:100%;
  margin-top:10px;
  padding:8px 10px;
  border-radius:999px;
  border:none;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  background:linear-gradient(135deg,#4ade80,#22c55e);
  color:#0f172a;
}
.small {
  font-size:11px;
  color:#9ca3af;
  margin-top:8px;
}
.error {
  margin-top:6px;
  font-size:11px;
  color:#fecaca;
  min-height:14px;
}
</style>
</head>
<body>
<div class="auth-card">
  <h1>라니MALL 로그인</h1>
  <p>카카오페이 심사용 일반 회원용 로그인 화면입니다. 이메일/비밀번호로 가입 후 로그인해 주세요.</p>

  <label for="email">이메일</label>
  <input type="email" id="email" placeholder="예: test@rani-mall.xyz" required>

  <label for="password">비밀번호</label>
  <input type="password" id="password" placeholder="6자 이상" required>

  <button id="signup-btn">회원가입</button>
  <button id="login-btn">로그인</button>

  <div id="error-box" class="error"></div>
  <div class="small">
    * 이 페이지는 결제 PG사 심사를 위한 테스트 계정용 화면입니다.
  </div>
</div>

<script type="module">
import { auth } from "./firebase.js";
import {
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

const emailInput = document.getElementById("email");
const pwInput    = document.getElementById("password");
const signupBtn  = document.getElementById("signup-btn");
const loginBtn   = document.getElementById("login-btn");
const errorBox   = document.getElementById("error-box");

function showError(msg) {
  errorBox.textContent = msg;
}

signupBtn.addEventListener("click", async () => {
  const email = emailInput.value.trim();
  const pw    = pwInput.value.trim();
  errorBox.textContent = "";

  if (!email || !pw) return showError("이메일과 비밀번호를 입력해 주세요.");
  if (pw.length < 6) return showError("비밀번호는 6자 이상이어야 합니다.");

  try {
    await createUserWithEmailAndPassword(auth, email, pw);
    alert("회원가입이 완료되었습니다. 같은 정보로 로그인해 주세요.");
  } catch (err) {
    showError("회원가입 실패: " + (err?.message || "다시 시도해 주세요."));
  }
});

loginBtn.addEventListener("click", async () => {
  const email = emailInput.value.trim();
  const pw    = pwInput.value.trim();
  errorBox.textContent = "";

  if (!email || !pw) return showError("이메일과 비밀번호를 입력해 주세요.");

  try {
    const result = await signInWithEmailAndPassword(auth, email, pw);
    if (result.user) {
      window.location.href = "home.html";
    }
  } catch (err) {
    showError("로그인 실패: " + (err?.message || "다시 시도해 주세요."));
  }
});
</script>
</body>
</html>
``]
