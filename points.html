<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>라니 디지털 - 포인트·결제·게임 정책</title>

<link rel="icon" type="image/png"
      href="https://cdn.discordapp.com/attachments/1083101135096795201/1479323459073867941/apple-touch-icon.png?ex=69ab9ed5&is=69aa4d55&hm=27698736fb541c68520d785517aa103392008f1ffbad142d5ba24a0807ab7973">

<style>
* { box-sizing:border-box; margin:0; padding:0 }
body {
  min-height:100vh;
  font-family:'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background:
    radial-gradient(circle at 0% 0%, rgba(56,189,248,.12), transparent 55%),
    radial-gradient(circle at 100% 0%, rgba(244,114,182,.12), transparent 55%),
    #020617;
  color:#e5e7eb;
}

/* 상단 바 */
.topbar {
  width:100%;
  border-bottom:1px solid rgba(31,41,55,.9);
  background:linear-gradient(90deg,#020617,#020617,#020617);
}
.topbar-inner {
  max-width:1080px;
  margin:0 auto;
  padding:14px 16px 12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.brand {
  display:flex;
  align-items:center;
  gap:10px;
}
.brand-logo {
  width:34px;
  height:34px;
  border-radius:10px;
  overflow:hidden;
  border:1px solid rgba(148,163,184,.6);
  background:#020617;
}
.brand-logo img {
  width:100%;
  height:100%;
  object-fit:cover;
}
.brand-text {
  display:flex;
  flex-direction:column;
  gap:2px;
}
.brand-name {
  font-size:15px;
  font-weight:700;
  letter-spacing:.03em;
}
.brand-sub {
  font-size:11px;
  color:#9ca3af;
}
.top-tag {
  font-size:11px;
  padding:4px 9px;
  border-radius:999px;
  border:1px solid rgba(148,163,184,.6);
  background:rgba(15,23,42,.9);
  color:#e5e7eb;
  display:inline-flex;
  align-items:center;
  gap:6px;
}

/* 메인 영역 */
.main {
  width:100%;
}
.main-inner {
  max-width:960px;
  margin:0 auto;
  padding:20px 16px 26px;
}

/* 헤더 블록 */
.title-kicker {
  font-size:11px;
  font-weight:600;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:#64748b;
}
.title-main {
  margin-top:4px;
  font-size:22px;
  font-weight:700;
  color:#f9fafb;
}
.title-sub {
  margin-top:6px;
  font-size:13px;
  color:#cbd5f5;
}
.chip-row {
  margin-top:10px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  font-size:11px;
}
.chip {
  padding:5px 10px;
  border-radius:999px;
  border:1px solid rgba(148,163,184,.45);
  background:rgba(15,23,42,.9);
  color:#e5e7eb;
}
.chip strong { font-weight:600; color:#a5b4fc; }

/* 사업자 정보 플랫 박스 */
.biz-box {
  margin-top:14px;
  padding:10px 12px;
  border-radius:10px;
  background:#020617;
  border:1px solid rgba(55,65,81,.9);
  font-size:12px;
  color:#e5e7eb;
  line-height:1.6;
}
.biz-box b { color:#4ade80; }

/* 섹션 공통 */
.section-list {
  margin-top:20px;
  border-top:1px solid rgba(30,41,59,.9);
}
.section {
  padding:14px 0 12px;
  border-bottom:1px solid rgba(30,41,59,.9);
}
.section-header {
  display:flex;
  align-items:flex-start;
  gap:10px;
  margin-bottom:6px;
}
.section-num {
  font-size:11px;
  font-weight:600;
  color:#64748b;
  min-width:52px;
}
.section-title {
  font-size:14px;
  font-weight:600;
  color:#e5e7eb;
}
.section-desc {
  margin-top:2px;
  font-size:11px;
  color:#94a3b8;
}
.section-body {
  margin-top:4px;
  font-size:12px;
  color:#e5e7eb;
  line-height:1.7;
}
.section-body ol,
.section-body ul {
  margin:4px 0 4px 18px;
}
.section-body li { margin:2px 0; }
.section-body p { margin:3px 0; }

/* 하단 버튼 */
.footer-actions {
  margin-top:18px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:flex-end;
  font-size:12px;
}
.btn {
  padding:7px 14px;
  border-radius:999px;
  border:1px solid rgba(75,85,99,.9);
  background:#020617;
  color:#e5e7eb;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  gap:6px;
  transition:background .15s, transform .15s, box-shadow .15s, border-color .15s;
}
.btn:hover {
  background:#111827;
}
.btn-primary {
  border-color:transparent;
  background:linear-gradient(135deg,#4f46e5,#22c55e);
  color:#f9fafb;
  box-shadow:0 0 20px rgba(79,70,229,.35);
}
.btn-primary:hover {
  transform:translateY(-1px);
  box-shadow:0 0 26px rgba(79,70,229,.45);
}

/* 모바일 */
@media (max-width:640px){
  .topbar-inner { flex-direction:column; align-items:flex-start; }
  .title-main { font-size:19px; }
}
</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <div
