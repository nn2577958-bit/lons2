<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>라니 디지털 - 포인트·결제·게임 정책</title>

<link rel="icon" type="image/png"
      href="https://cdn.discordapp.com/attachments/1083101135096795201/1479323459073867941/apple-touch-icon.png?ex=69ab9ed5&is=69aa4d55&hm=27698736fb541c68520d785517aa103392008f1ffbad142d5ba24a0807ab7973">

<style>
* { box-sizing:border-box; margin:0; padding:0 }
body {
  min-height:100vh;
  font-family:'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background:
    radial-gradient(circle at 0% 0%, #dbeafe 0, transparent 50%),
    radial-gradient(circle at 100% 0%, #fee2e2 0, transparent 55%),
    linear-gradient(180deg,#f9fafb,#e5e7eb);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:#0f172a;
}

/* 전체 레이아웃 */
.shell {
  width: 96vw;
  max-width: 1040px;
  background:#f9fafb;
  border-radius:24px;
  border:1px solid rgba(148,163,184,.4);
  box-shadow:
    0 18px 40px rgba(15,23,42,.12),
    0 0 0 1px rgba(255,255,255,.8) inset;
  display:grid;
  grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.6fr);
  overflow:hidden;
}

@media (max-width: 900px) {
  .shell {
    grid-template-columns: 1fr;
  }
}

/* 왼쪽 사이드 */
.sidebar {
  padding:22px 22px 20px;
  background:linear-gradient(160deg,#0f172a,#020617);
  color:#e5e7eb;
  display:flex;
  flex-direction:column;
  gap:18px;
  position:relative;
  overflow:hidden;
}
.sidebar::before {
  content:'';
  position:absolute;
  inset:-40%;
  background:
    radial-gradient(circle at 0% 0%, rgba(59,130,246,.4), transparent 55%),
    radial-gradient(circle at 100% 0%, rgba(244,114,182,.4), transparent 60%);
  opacity:.9;
  filter:blur(8px);
}
.sidebar-inner {
  position:relative;
  z-index:1;
}

/* 로고/타이틀 */
.brand-row {
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:10px;
}
.brand-logo {
  width:42px;
  height:42px;
  border-radius:14px;
  overflow:hidden;
  border:1px solid rgba(148,163,184,.7);
  box-shadow:0 12px 28px rgba(15,23,42,.85);
  background:rgba(15,23,42,.9);
}
.brand-logo img {
  width:100%;
  height:100%;
  object-fit:cover;
}
.brand-text {
  display:flex;
  flex-direction:column;
  gap:3px;
}
.brand-name {
  font-size:17px;
  font-weight:700;
  letter-spacing:.04em;
}
.brand-sub {
  font-size:11px;
  color:#cbd5f5;
  opacity:.92;
}

/* 사이드박스 */
.side-box {
  margin-top:8px;
  padding:10px 11px;
  border-radius:14px;
  border:1px solid rgba(148,163,184,.35);
  background:rgba(15,23,42,.82);
  font-size:11px;
  line-height:1.7;
  color:#e5e7eb;
}
.side-box b { color:#facc15; }

/* 섹션 목차 */
.nav-title {
  margin-top:14px;
  font-size:12px;
  font-weight:600;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:#9ca3af;
}
.nav-list {
  margin-top:6px;
  display:flex;
  flex-direction:column;
  gap:4px;
}
.nav-item {
  font-size:12px;
  padding:6px 8px;
  border-radius:10px;
  color:#e5e7eb;
  cursor:default;
  display:flex;
  align-items:center;
  gap:6px;
}
.nav-item span {
  font-size:11px;
  opacity:.8;
}
.nav-item strong {
  font-weight:600;
}

/* 하단 배지 */
.side-footer {
  margin-top:16px;
  font-size:10px;
  color:#9ca3af;
  line-height:1.6;
}

/* 우측 본문 카드 */
.main {
  padding:22px 24px 20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.page-kicker {
  font-size:11px;
  font-weight:600;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:#6b7280;
}
.page-title {
  margin-top:4px;
  font-size:20px;
  font-weight:700;
  color:#111827;
}
.page-sub {
  margin-top:4px;
  font-size:12px;
  color:#6b7280;
}

/* 본문 스크롤 영역 */
.terms {
  margin-top:10px;
  font-size:12px;
  line-height:1.8;
  color:#111827;
  max-height:60vh;
  overflow-y:auto;
  padding-right:8px;
  padding-bottom:4px;
}
.terms h2 {
  font-size:13px;
  margin:14px 0 5px;
  color:#111827;
}
.terms ol, .terms ul {
  margin:4px 0 4px 18px;
}
.terms li { margin:2px 0; }
.terms p { margin:4px 0; }

/* 버튼 영역 */
.btn-row {
  display:flex;
  justify-content:flex-end;
  gap:8px;
  margin-top:14px;
}
.btn {
  padding:7px 14px;
  border-radius:999px;
  border:1px solid rgba(148,163,184,.7);
  cursor:pointer;
  font-size:12px;
  font-weight:600;
  display:inline-flex;
  align-items:center;
  gap:6px;
  transition:background .15s, transform .15s, box-shadow .15s, border-color .15s;
}
.btn-home {
  background:linear-gradient(135deg,#2563eb,#22c55e);
  color:white;
  border-color:transparent;
  box-shadow:0 8px 18px rgba(37,99,235,.32);
}
.btn-home:hover {
  transform:translateY(-1px);
  box-shadow:0 10px 22px rgba(37,99,235,.38);
}
.btn-outline {
  background:white;
  color:#111827;
}
.btn-outline:hover {
  background:#e5e7eb;
}
</style>
</head>

      </div>
    </div>
  </aside>
