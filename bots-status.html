<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>라니 디지털 - 봇 상태</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #020617;
      color: #e5e7eb;
      margin: 0;
    }
    header {
      border-bottom: 1px solid #111827;
      background: #020617dd;
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .wrap {
      max-width: 1040px;
      margin: 0 auto;
      padding: 16px;
    }
    h1 {
      font-size: 26px;
      margin: 0 0 4px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 span.logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 8px #22c55eaa;
    }
    .sub {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 4px;
    }
    .updated {
      font-size: 11px;
      color: #6b7280;
    }
    main { padding: 16px 0 32px 0; }

    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 16px 0 10px 0;
      font-size: 12px;
      color: #9ca3af;
    }
    .summary-item {
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid #1f2937;
      background: #020617;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .summary-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .filter-btn {
      border-radius: 999px;
      border: 1px solid #1f2937;
      background: #020617;
      color: #9ca3af;
      font-size: 12px;
      padding: 4px 10px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .filter-btn.active {
      background: #111827;
      color: #e5e7eb;
      border-color: #22c55e55;
    }
    .filter-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
    }
    .dot-online { background: #22c55e; }
    .dot-offline { background: #ef4444; }
    .dot-maintenance { background: #f97316; }
    .dot-testing { background: #0ea5e9; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    .card {
      background: radial-gradient(circle at top left, #0b1120, #020617 60%);
      border-radius: 14px;
      border: 1px solid #111827;
      padding: 14px 14px 12px 14px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      inset: -40%;
      opacity: 0.04;
      background: radial-gradient(circle at top right, #22c55e, transparent 60%);
      pointer-events: none;
    }
    .card-inner {
      position: relative;
      z-index: 1;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .badge span.dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
    }
    .badge-online {
      background: #16a34a22;
      color: #4ade80;
    }
    .badge-online span.dot { background: #22c55e; }
    .badge-offline {
      background: #b91c1c22;
      color: #fca5a5;
    }
    .badge-offline span.dot { background: #ef4444; }
    .badge-maintenance {
      background: #f9731622;
      color: #fed7aa;
    }
    .badge-maintenance span.dot { background: #f97316; }
    .badge-testing {
      background: #0ea5e922;
      color: #7dd3fc;
    }
    .badge-testing span.dot { background: #0ea5e9; }

    .name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .tag {
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 8px;
    }
    .desc {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 10px;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #6b7280;
    }
    .pill {
      padding: 2px 8px;
      border-radius: 999px;
      background: #020617;
      border: 1px solid #111827;
    }
    .pill span {
      color: #e5e7eb;
    }
    @media (max-width: 640px) {
      h1 { font-size: 22px; }
      .wrap { padding-inline: 12px; }
      .summary { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1><span class="logo-dot"></span>라니 디지털 봇 상태</h1>
      <div class="sub">RLNL 계열 디스코드 봇의 현재 운영 상태를 한눈에 확인할 수 있습니다.</div>
      <div class="updated" id="updated-text"></div>
    </div>
  </header>

  <main>
    <div class="wrap">
      <div class="summary" id="summary-bar"></div>

      <div class="filters">
        <button class="filter-btn active" data-filter="all">전체</button>
        <button class="filter-btn" data-filter="online">
          <span class="filter-dot dot-online"></span>
